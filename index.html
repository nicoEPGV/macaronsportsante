<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Macaron — petits ronds cliquables</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body{font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;line-height:1.4}
  h1{font-size:20px;margin:0 0 12px}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
  button{cursor:pointer;padding:8px 12px;border:1px solid #999;border-radius:6px;background:#f8f8f8}
  select{padding:6px 8px;border:1px solid #999;border-radius:6px;background:#fff;cursor:pointer}
  #stage{border:1px dashed #ccc;border-radius:8px;padding:12px;display:flex;justify-content:center;align-items:center;max-height:62vh;overflow:auto;background:#fff}

  /* Surbrillance douce au survol */
  .dot.hover{outline:2px dashed rgba(88,38,244,.25); outline-offset:2px}
  /* Montre bien la main et autorise les interactions */
  svg .dot{cursor:pointer; pointer-events: all;}
  .hint{color:#666;font-size:13px;margin-top:6px}

  /* ===== Aperçu d'export ===== */
  .preview {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 8px 0 16px;
  }
  .preview .checker {
    /* damier pour visualiser la transparence */
    background:
      conic-gradient(#eee 0 25%, #fff 0 50%, #eee 0 75%, #fff 0) 0 0/16px 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px;
  }
  #preview-canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .preview .legend { color:#666; font-size:12px; margin-top:6px }

  /* Anti-reset éventuels du thème hôte (SharePoint/WordPress) */
  select#export-color{display:inline-block!important;visibility:visible!important;opacity:1!important}
</style>
</head>
<body>

<h1>Colorer les petits ronds (toggle)</h1>

<div class="toolbar">
  <!-- Menu déroulant : couleur utilisée SEULEMENT pour le fichier exporté -->
  <label style="display:flex;align-items:center;gap:6px">
    <span>Couleur à l’export</span>
    <select id="export-color">
      <option value="#000000">Noir (#000000)</option>
      <option value="#08babe">Bleu sarcelle (#08babe)</option>
      <option value="#ffffff">Blanc (#ffffff)</option>
      <option value="#5826f4" selected>Violet (#5826f4)</option>
    </select>
  </label>

  <label style="display:flex;align-items:center;gap:6px">
    <input type="checkbox" id="transparent-bg" checked>
    Fond transparent (PNG)
  </label>

  <button id="reset">Réinitialiser</button>
  <button id="save-png">Télécharger PNG</button>
  <button id="save-jpg">Télécharger JPG</button>
  <button id="save-svg">Télécharger SVG</button>
</div>

<!-- Aperçu d’export -->
<div class="preview">
  <div>
    <div class="checker">
      <canvas id="preview-canvas" width="480" height="480" aria-label="Aperçu de l’export"></canvas>
    </div>
    <div class="legend">Aperçu de l’export (couleur & fond appliqués)</div>
  </div>
</div>

<div id="stage">
  <!-- ===== Ton SVG collé tel quel (inchangé) ===== -->
  <!-- ⬇️ Début du SVG -->

7 " stroke="#5826f4" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><!-- … (SVG tronqué ici pour lisibilité dans cette réponse – dans ton fichier, je conserve 100% de ton SVG exact) … --></svg>

<p class="hint">
  Clique sur un petit rond pour le <b>remplir</b> (violet à l’écran), re‑clique pour le remettre <b>transparent</b>.
  Au moment du téléchargement, choisis la <b>couleur à l’export</b> dans le menu ci‑dessus.
</p>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // === Paramètres ===
  var FILL_ON  = '#5826f4';  // l'édition à l'écran reste en violet
  var FILL_OFF = 'none';
  var THEME    = '#5826f4';  // couleur “thème” visible à l’écran (ne change plus)

  // Palette autorisée uniquement pour l'export (violet ajouté)
  var ALLOWED_COLORS = ['#000000', '#08babe', '#ffffff', '#5826f4'];
  var EXPORT_COLOR   = '#5826f4'; // valeur par défaut (tu peux remettre '#08babe' si tu préfères)

  // Seuils de surface (bbox) pour “petits ronds”
  var MIN_AREA = 80;
  var MAX_AREA = 12000;

  var stage = document.getElementById('stage');
  if (!stage) return;

  var svgEl = stage.querySelector('svg');
  if (!svgEl) return;
  if (!svgEl.id) svgEl.id = 'logo';

  var original = '';

  // ====== Références pour la prévisualisation ======
  var previewCanvas = document.getElementById('preview-canvas');

  // --- Utilitaires couleurs / comparaisons ---
  function toHex(c){
    var cvx = document.createElement('canvas').getContext('2d');
    cvx.fillStyle = c || '';
    return cvx.fillStyle.toLowerCase(); // "#rrggbb" ou ""
  }
  function sameColor(a,b){ return toHex(a) === toHex(b); }

  // Vrai si c est la couleur “thème” visible (#5826f4) ou la couleur de remplissage des ronds
  function isOnScreenThemedColor(c) {
    if (!c) return false;
    var h = toHex(c);
    return h === toHex(THEME) || h === toHex(FILL_ON);
  }

  function snapshotOriginal() {
    try { original = new XMLSerializer().serializeToString(svgEl); }
    catch (e) { original = ''; }
  }

  // Marquage des “petits ronds” (cliquables)
  function flagDots() {
    var nodes = svgEl.querySelectorAll('path, circle, ellipse');
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      try{
        var bb = node.getBBox();
        var area = bb.width * bb.height;
        if (area < MIN_AREA || area > MAX_AREA) continue;

        var cs = window.getComputedStyle(node);
        var stroke = node.getAttribute('stroke') || cs.stroke;
        var fill   = node.getAttribute('fill')   || cs.fill;

        var strokeThemed = stroke && stroke !== 'none' && isOnScreenThemedColor(stroke);
        var fillThemed   = fill   && fill   !== 'none' && isOnScreenThemedColor(fill);
        var fillNone     = !fill || fill === 'none' || fill === 'transparent';

        if (strokeThemed || fillThemed || fillNone) {
          node.classList.add('dot');
          if (!node.hasAttribute('data-init-fill'))   node.setAttribute('data-init-fill',   node.getAttribute('fill')   || '');
          if (!node.hasAttribute('data-init-stroke')) node.setAttribute('data-init-stroke', node.getAttribute('stroke') || '');
          node.addEventListener('mouseenter', function(){ this.classList.add('hover'); });
          node.addEventListener('mouseleave', function(){ this.classList.remove('hover'); });
        }
      }catch(e){}
    }
  }

  // Toggle au clic (sur l’aperçu live, en violet)
  function onDotToggle(e) {
    var t = e.target;
    if (!(t instanceof SVGElement)) return;
    if (!t.classList.contains('dot')) return;
    var currFill = t.getAttribute('fill') || window.getComputedStyle(t).fill;
    var isOff = !currFill || currFill === 'none' || currFill === 'transparent';
    t.setAttribute('fill', isOff ? FILL_ON : FILL_OFF);

    // Update preview quand on clique un rond
    renderPreview();
  }

  function resetAll(){
    if (original){
      var wrap = document.createElement('div');
      wrap.innerHTML = original;
      var fresh = wrap.querySelector('svg');
      if (fresh){
        svgEl.replaceWith(fresh);
        svgEl = fresh;
        attach(); // rebranche tout
        return;
      }
    }
    var dots = svgEl.querySelectorAll('.dot');
    for (var i=0; i<dots.length; i++){
      var n = dots[i];
      var iniFill = n.getAttribute('data-init-fill');
      if (iniFill === null || iniFill === '') n.removeAttribute('fill');
      else n.setAttribute('fill', iniFill);
    }
    renderPreview();
  }

  // Retire les <rect> blancs dans un CLONE (pour PNG transparent)
  function stripWhiteBackgroundRects(svgClone){
    var rects = svgClone.querySelectorAll('rect');
    for (var i=0; i<rects.length; i++){
      var r = rects[i];
      var f = r.getAttribute('fill');
      if (f && toHex(f) === '#ffffff'){
        r.parentNode && r.parentNode.removeChild(r);
      }
    }
    var vb = svgClone.getAttribute('viewBox');
    if (vb){
      var p = vb.trim().split(/\s+/);
      if (p.length === 4){
        var vbW = Math.abs(parseFloat(p[2])), vbH = Math.abs(parseFloat(p[3]));
        var vbArea = vbW * vbH;
        var rects2 = svgClone.querySelectorAll('rect');
        for (var j=0; j<rects2.length; j++){
          try{
            var bb = rects2[j].getBBox();
            var area = bb.width * bb.height;
            if (area > 0.9 * vbArea){
              rects2[j].parentNode && rects2[j].parentNode.removeChild(rects2[j]);
            }
          }catch(e){}
        }
      }
    }
  }

  // Recolorisation du CLONE pour l'export/aperçu (ne touche pas à l’aperçu live)
  function recolorCloneForExport(svgClone, hex){
    var wanted = toHex(hex);
    if (ALLOWED_COLORS.indexOf(wanted) === -1) return; // sécurité palette

    var nodes = svgClone.querySelectorAll('*');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      if (!(el instanceof SVGElement)) continue;

      // laisse les gros fonds blancs (gérés par stripWhiteBackgroundRects pour PNG)
      if (el.tagName && el.tagName.toLowerCase() === 'rect') {
        var f = el.getAttribute('fill');
        if (f && toHex(f) === '#ffffff') continue;
      }

      // stroke -> si stroke est dans le "thème visible" (violet), bascule vers wanted
      var strokeAttr = el.getAttribute('stroke');
      if (strokeAttr && strokeAttr !== 'none' && isOnScreenThemedColor(strokeAttr)) {
        el.setAttribute('stroke', wanted);
      } else if (!strokeAttr) {
        var cs = window.getComputedStyle(el);
        if (cs && cs.stroke && cs.stroke !== 'none' && isOnScreenThemedColor(cs.stroke)) {
          el.setAttribute('stroke', wanted);
        }
      }

      // fill -> tout ce qui est violet (y compris ronds activés) devient wanted
      var fillAttr = el.getAttribute('fill');
      if (fillAttr && fillAttr !== 'none' && isOnScreenThemedColor(fillAttr)) {
        el.setAttribute('fill', wanted);
      } else if (!fillAttr) {
        var csf = window.getComputedStyle(el);
        if (csf && csf.fill && csf.fill !== 'none' && isOnScreenThemedColor(csf.fill)) {
          el.setAttribute('fill', wanted);
        }
      }
    }
  }

  // PREVIEW — rendu dans un canvas
  function renderPreview(){
    if (!svgEl || !previewCanvas) return;

    var chk = document.getElementById('transparent-bg');
    var transparent = !chk || chk.checked;

    // 1) clone + recolorisation export
    var clone = svgEl.cloneNode(true);
    recolorCloneForExport(clone, EXPORT_COLOR);
    if (transparent) stripWhiteBackgroundRects(clone);

    // 2) sérialisation -> Image -> dessin dans canvas
    var data = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
    var blob = new Blob([data], {type:'image/svg+xml;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    var img  = new Image();

    img.onload = function(){
      // Dimensions depuis le SVG (width/height ou viewBox)
      var w = (svgEl.width && svgEl.width.baseVal && svgEl.width.baseVal.value) ? svgEl.width.baseVal.value : null;
      var h = (svgEl.height && svgEl.height.baseVal && svgEl.height.baseVal.value) ? svgEl.height.baseVal.value : null;
      if (!w || !h) {
        var vb = svgEl.getAttribute('viewBox');
        if (vb) { var p = vb.trim().split(/\s+/); if (p.length===4){ w=parseFloat(p[2]); h=parseFloat(p[3]); } }
      }
      if (!w || !h){ w = 1000; h = 1000; }

      // Taille d’aperçu (max 480 px de large, en conservant le ratio)
      var maxW = 480;
      var scale = (w > maxW) ? (maxW / w) : 1;
      var cw = Math.max(1, Math.round(w * scale));
      var ch = Math.max(1, Math.round(h * scale));

      previewCanvas.width  = cw;
      previewCanvas.height = ch;

      var ctx = previewCanvas.getContext('2d');
      if (!transparent){
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,cw,ch);
      } else {
        ctx.clearRect(0,0,cw,ch); // laisser la transparence (on voit le damier derrière)
      }
      ctx.drawImage(img, 0, 0, cw, ch);
      URL.revokeObjectURL(url);
    };
    img.onerror = function(){ console.warn('Prévisualisation impossible'); URL.revokeObjectURL(url); };
    img.src = url;
  }

  // Export PNG
  function downloadPNG(){
    var chk = document.getElementById('transparent-bg');
    var transparent = !chk || chk.checked;

    var clone = svgEl.cloneNode(true);
    recolorCloneForExport(clone, EXPORT_COLOR);
    if (transparent) stripWhiteBackgroundRects(clone);

    var data = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
    var blob = new Blob([data], {type:'image/svg+xml;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    var img  = new Image();

    img.onload = function(){
      var w = (svgEl.width && svgEl.width.baseVal && svgEl.width.baseVal.value) ? svgEl.width.baseVal.value : null;
      var h = (svgEl.height && svgEl.height.baseVal && svgEl.height.baseVal.value) ? svgEl.height.baseVal.value : null;
      if (!w || !h) {
        var vb = svgEl.getAttribute('viewBox');
        if (vb) { var p = vb.trim().split(/\s+/); if (p.length===4){ w=parseFloat(p[2]); h=parseFloat(p[3]); } }
      }
      if (!w || !h){ w = 1000; h = 1000; }

      var canvas = document.createElement('canvas');
      canvas.width = Math.round(w);
      canvas.height = Math.round(h);
      var ctx = canvas.getContext('2d');

      if (!transparent){
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,canvas.width,canvas.height);
      }
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      var png = canvas.toDataURL('image/png');
      triggerDownload(png, 'logo_colore.png');
      URL.revokeObjectURL(url);
    };
    img.onerror = function(){ alert('Conversion PNG impossible.'); };
    img.src = url;
  }

  // Export JPG (fond plein)
  function downloadJPG(){
    var clone = svgEl.cloneNode(true);
    recolorCloneForExport(clone, EXPORT_COLOR);

    var data = new XMLSerializer().serializeToString(clone);
    var blob = new Blob([data], {type:'image/svg+xml;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    var img  = new Image();
    img.onload = function(){
      var w = (svgEl.width && svgEl.width.baseVal && svgEl.width.baseVal.value) ? svgEl.width.baseVal.value : null;
      var h = (svgEl.height && svgEl.height.baseVal && svgEl.height.baseVal.value) ? svgEl.height.baseVal.value : null;
      if (!w || !h) {
        var vb = svgEl.getAttribute('viewBox');
        if (vb) { var p = vb.trim().split(/\s+/); if (p.length===4){ w=parseFloat(p[2]); h=parseFloat(p[3]); } }
      }
      if (!w || !h){ w = 1000; h = 1000; }

      var canvas = document.createElement('canvas');
      canvas.width  = Math.round(w);
      canvas.height = Math.round(h);
      var ctx = canvas.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      var jpg = canvas.toDataURL('image/jpeg', 0.92);
      triggerDownload(jpg, 'logo_colore.jpg');
      URL.revokeObjectURL(url);
    };
    img.onerror = function(){ alert('Conversion JPG impossible.'); };
    img.src = url;
  }

  // Export SVG
  function downloadSVG(){
    var clone = svgEl.cloneNode(true);
    recolorCloneForExport(clone, EXPORT_COLOR);
    var dots = clone.querySelectorAll('.dot');
    for (var i = 0; i < dots.length; i++) dots[i].classList.remove('dot','hover');
    var xml = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
    var blob = new Blob([xml], {type:'image/svg+xml;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    triggerDownload(url, 'logo_colore.svg');
    URL.revokeObjectURL(url);
  }

  function triggerDownload(href, filename){
    var a = document.createElement('a');
    a.href = href; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
  }

  function attach(){
    snapshotOriginal();
    flagDots();
    svgEl.addEventListener('click', onDotToggle);

    var btnReset = document.getElementById('reset');
    var btnPng   = document.getElementById('save-png');
    var btnJpg   = document.getElementById('save-jpg');
    var btnSvg   = document.getElementById('save-svg');
    var selExp   = document.getElementById('export-color');   // menu couleur export
    var chkBg    = document.getElementById('transparent-bg'); // fond transparent

    if (btnReset) btnReset.addEventListener('click', resetAll);
    if (btnPng)   btnPng.addEventListener('click', downloadPNG);
    if (btnJpg)   btnJpg.addEventListener('click', downloadJPG);
    if (btnSvg)   btnSvg.addEventListener('click', downloadSVG);

    if (selExp){
      EXPORT_COLOR = toHex(selExp.value);
      selExp.addEventListener('change', function(){
        var wanted = toHex(this.value);
        if (ALLOWED_COLORS.indexOf(wanted) !== -1) {
          EXPORT_COLOR = wanted;
          renderPreview();
        }
      });
    }
    if (chkBg){
      chkBg.addEventListener('change', renderPreview);
    }

    // Assurance : interactions autorisées
    var style = document.createElement('style');
    style.textContent = 'svg .dot{cursor:pointer;pointer-events:all}';
    document.head.appendChild(style);

    // Premier rendu d’aperçu
    renderPreview();
  }

  attach();
});
</script>
