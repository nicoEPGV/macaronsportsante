<p class="hint">Clique sur un petit rond pour le <b>remplir</b> en <code>#5826f4</code>, re-clique pour le remettre <b>transparent</b>. Seuls les petits ronds sont modifiables.</p>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // === Paramètres ===
  var FILL_ON  = '#5826f4';  // sera synchronisé avec la couleur "thème"
  var FILL_OFF = 'none';
  var THEME    = '#5826f4';  // couleur "thème" courante
  // Palette autorisée uniquement
  var ALLOWED_COLORS = ['#000000', '#08babe', '#ffffff'];

  // Seuils de surface (bbox) pour “petits ronds”
  var MIN_AREA = 80;
  var MAX_AREA = 12000;

  var stage = document.getElementById('stage');
  if (!stage) return;

  var svgEl = stage.querySelector('svg');
  if (!svgEl) return;
  if (!svgEl.id) svgEl.id = 'logo';

  var original = '';

  // --- Utilitaires ---
  function snapshotOriginal() {
    try { original = new XMLSerializer().serializeToString(svgEl); }
    catch (e) { original = ''; }
  }
  function toHex(c){
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = c || '';
    return ctx.fillStyle.toLowerCase(); // "#rrggbb" ou ""
  }
  function sameColor(a,b){ return toHex(a) === toHex(b); }

  // Vrai si c est la couleur thème actuelle OU l'ancien violet (#5826f4)
  function isThemedColor(c) {
    if (!c) return false;
    var h = toHex(c);
    return h === toHex(THEME) || h === toHex('#5826f4');
  }

  // Retire les grands <rect> blancs du CLONE pour export PNG transparent
  function stripWhiteBackgroundRects(svgClone){
    // 1) par couleur (fill=white)
    var rects = svgClone.querySelectorAll('rect');
    for (var i=0; i<rects.length; i++){
      var r = rects[i];
      var fillAttr = r.getAttribute('fill');
      if (fillAttr && toHex(fillAttr) === '#ffffff'){
        r.parentNode && r.parentNode.removeChild(r);
      }
    }
    // 2) par surface géante (≈ viewBox)
    var vb = svgClone.getAttribute('viewBox');
    if (vb){
      var p = vb.trim().split(/\s+/);
      if (p.length === 4){
        var vbW = Math.abs(parseFloat(p[2])), vbH = Math.abs(parseFloat(p[3]));
        var vbArea = vbW * vbH;
        var rects2 = svgClone.querySelectorAll('rect');
        for (var j=0; j<rects2.length; j++){
          try{
            var bb = rects2[j].getBBox();
            var area = bb.width * bb.height;
            if (area > 0.9 * vbArea){
              rects2[j].parentNode && rects2[j].parentNode.removeChild(rects2[j]);
            }
          }catch(e){}
        }
      }
    }
  }

  // --- Détection des “petits ronds” (cliquables) ---
  function flagDots() {
    var nodes = svgEl.querySelectorAll('path, circle, ellipse');
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      try{
        var bb = node.getBBox();
        var area = bb.width * bb.height;
        if (area < MIN_AREA || area > MAX_AREA) continue;

        var cs = window.getComputedStyle(node);
        var stroke = node.getAttribute('stroke') || cs.stroke;
        var fill   = node.getAttribute('fill')   || cs.fill;

        // ⬇️ au lieu de comparer au "violet" fixe, on compare à la "couleur thème"
        var strokeThemed = stroke && stroke !== 'none' && isThemedColor(stroke);
        var fillThemed   = fill   && fill   !== 'none' && isThemedColor(fill);
        var fillNone     = !fill || fill === 'none' || fill === 'transparent';

        if (strokeThemed || fillThemed || fillNone) {
          node.classList.add('dot');
          if (!node.hasAttribute('data-init-fill'))   node.setAttribute('data-init-fill',   node.getAttribute('fill')   || '');
          if (!node.hasAttribute('data-init-stroke')) node.setAttribute('data-init-stroke', node.getAttribute('stroke') || '');
          node.addEventListener('mouseenter', function(){ this.classList.add('hover'); });
          node.addEventListener('mouseleave', function(){ this.classList.remove('hover'); });
        }
      }catch(e){}
    }
  }

  // --- Re-thématisation : applique "hex" à tout le logo qui est "dans le thème" ---
  function applyThemeColor(hex){
    // Normalise + vérifie palette autorisée
    var wanted = toHex(hex);
    if (ALLOWED_COLORS.indexOf(wanted) === -1) {
      return; // couleur refusée
    }

    // 1) Met à jour THEME et la couleur de toggle (ronds)
    THEME   = wanted;
    FILL_ON = wanted;

    // 2) Parcourt tous les éléments graphiques
    var nodes = svgEl.querySelectorAll('*');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      if (!(el instanceof SVGElement)) continue;

      // ne pas toucher aux grands fonds blancs; ils sont gérés à l’export PNG
      if (el.tagName && el.tagName.toLowerCase() === 'rect') {
        var f = el.getAttribute('fill');
        if (f && toHex(f) === '#ffffff') continue;
      }

      // stroke
      var strokeAttr = el.getAttribute('stroke');
      if (strokeAttr && strokeAttr !== 'none' && isThemedColor(strokeAttr)) {
        el.setAttribute('stroke', THEME);
      } else if (!strokeAttr) {
        var cs = window.getComputedStyle(el);
        if (cs && cs.stroke && cs.stroke !== 'none' && isThemedColor(cs.stroke)) {
          el.setAttribute('stroke', THEME);
        }
      }

      // fill
      var fillAttr = el.getAttribute('fill');
      if (fillAttr && fillAttr !== 'none' && isThemedColor(fillAttr)) {
        el.setAttribute('fill', THEME);
      } else if (!fillAttr) {
        var csf = window.getComputedStyle(el);
        if (csf && csf.fill && csf.fill !== 'none' && isThemedColor(csf.fill)) {
          el.setAttribute('fill', THEME);
        }
      }
    }

    // 3) Adapter la surbrillance hover à la nouvelle couleur
    var style = document.getElementById('theme-outline-style');
    if (!style) {
      style = document.createElement('style');
      style.id = 'theme-outline-style';
      document.head.appendChild(style);
    }
    style.textContent = '.dot.hover{outline:2px dashed ' + THEME + '40; outline-offset:2px}';
  }

  // --- Toggle au clic (remplissage des ronds) ---
  function onDotToggle(e) {
    var t = e.target;
    if (!(t instanceof SVGElement)) return;
    if (!t.classList.contains('dot')) return;
    var currFill = t.getAttribute('fill') || window.getComputedStyle(t).fill;
    var isOff = !currFill || currFill === 'none' || currFill === 'transparent';
    t.setAttribute('fill', isOff ? FILL_ON : FILL_OFF);
  }

  // --- Réinitialiser ---
  function resetAll(){
    if (original){
      var wrap = document.createElement('div');
      wrap.innerHTML = original;
      var fresh = wrap.querySelector('svg');
      if (fresh){
        svgEl.replaceWith(fresh);
        svgEl = fresh;
        attach();   // rebranche tout (thème, listeners, etc.)
        return;
      }
    }
    // Fallback
    var dots = svgEl.querySelectorAll('.dot');
    for (var i=0; i<dots.length; i++){
      var n = dots[i];
      var iniFill = n.getAttribute('data-init-fill');
      if (iniFill === null || iniFill === '') n.removeAttribute('fill');
      else n.setAttribute('fill', iniFill);
    }
  }

  // --- Export PNG (transparent si case cochée) ---
  function downloadPNG(){
    var chk = document.getElementById('transparent-bg');
    var transparent = !chk || chk.checked;

    var clone = svgEl.cloneNode(true);
    if (transparent) stripWhiteBackgroundRects(clone);

    var data = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
    var blob = new Blob([data], {type:'image/svg+xml;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    var img  = new Image();

    img.onload = function(){
      var w = (svgEl.width && svgEl.width.baseVal && svgEl.width.baseVal.value) ? svgEl.width.baseVal.value : null;
      var h = (svgEl.height && svgEl.height.baseVal && svgEl.height.baseVal.value) ? svgEl.height.baseVal.value : null;
      if (!w || !h) {
        var vb = svgEl.getAttribute('viewBox');
        if (vb) { var p = vb.trim().split(/\s+/); if (p.length===4){ w=parseFloat(p[2]); h=parseFloat(p[3]); } }
      }
      if (!w || !h){ w = 1000; h = 1000; }

      var canvas = document.createElement('canvas');
      canvas.width = Math.round(w);
      canvas.height = Math.round(h);
      var ctx = canvas.getContext('2d');

      if (!transparent){
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,canvas.width,canvas.height);
      }
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      var png = canvas.toDataURL('image/png');
      triggerDownload(png, 'logo_colore.png');
      URL.revokeObjectURL(url);
    };
    img.onerror = function(){ alert('Conversion PNG impossible.'); };
    img.src = url;
  }

  // --- Export JPG (toujours fond plein) ---
  function downloadJPG(){
    var data = new XMLSerializer().serializeToString(svgEl);
    var blob = new Blob([data], {type:'image/svg+xml;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    var img  = new Image();
    img.onload = function(){
      var w = (svgEl.width && svgEl.width.baseVal && svgEl.width.baseVal.value) ? svgEl.width.baseVal.value : null;
      var h = (svgEl.height && svgEl.height.baseVal && svgEl.height.baseVal.value) ? svgEl.height.baseVal.value : null;
      if (!w || !h) {
        var vb = svgEl.getAttribute('viewBox');
        if (vb) { var p = vb.trim().split(/\s+/); if (p.length===4){ w=parseFloat(p[2]); h=parseFloat(p[3]); } }
      }
      if (!w || !h){ w = 1000; h = 1000; }

      var canvas = document.createElement('canvas');
      canvas.width  = Math.round(w);
      canvas.height = Math.round(h);
      var ctx = canvas.getContext('2d');

      // fond blanc
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      var jpg = canvas.toDataURL('image/jpeg', 0.92);
      triggerDownload(jpg, 'logo_colore.jpg');
      URL.revokeObjectURL(url);
    };
    img.onerror = function(){ alert('Conversion JPG impossible.'); };
    img.src = url;
  }

  // --- Export SVG (nettoyé des classes .dot/.hover) ---
  function downloadSVG(){
    var clone = svgEl.cloneNode(true);
    var dots = clone.querySelectorAll('.dot');
    for (var i = 0; i < dots.length; i++) dots[i].classList.remove('dot','hover');
    var xml = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
    var blob = new Blob([xml], {type:'image/svg+xml;charset=utf-8'});
    var url  = URL.createObjectURL(blob);
    triggerDownload(url, 'logo_colore.svg');
    URL.revokeObjectURL(url);
  }

  function triggerDownload(href, filename){
    var a = document.createElement('a');
    a.href = href; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
  }

  function attach(){
    snapshotOriginal();
    flagDots();
    svgEl.addEventListener('click', onDotToggle);

    var btnReset = document.getElementById('reset');
    var btnPng   = document.getElementById('save-png');
    var btnJpg   = document.getElementById('save-jpg');
    var btnSvg   = document.getElementById('save-svg');
    var sel      = document.getElementById('theme-select'); // ⬅️ menu couleurs

    if (btnReset) btnReset.addEventListener('click', resetAll);
    if (btnPng)   btnPng.addEventListener('click', downloadPNG);
    if (btnJpg)   btnJpg.addEventListener('click', downloadJPG);
    if (btnSvg)   btnSvg.addEventListener('click', downloadSVG);

    // Lier le menu et appliquer la couleur choisie au chargement
    if (sel) {
      sel.addEventListener('change', function(){
        applyThemeColor(this.value);  // uniquement si la valeur est autorisée
      });
      applyThemeColor(sel.value);     // applique la valeur par défaut du <select>
    }

    // Assurance : autoriser les interactions sur les éléments ciblés
    var style = document.createElement('style');
    style.textContent = 'svg .dot{cursor:pointer;pointer-events:all}';
    document.head.appendChild(style);
  }

  attach();
});
</script>

</body>

</html>
