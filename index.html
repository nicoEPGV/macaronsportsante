<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Coloration du Logo</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 20px;
    }
    #canvas-container {
        margin: auto;
        width: fit-content;
        padding: 10px;
    }
    #color-picker {
        margin-top: 15px;
        width: 150px;
        height: 40px;
    }
    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
    }
    svg circle { cursor: pointer; }
</style>
</head>
<body>

<h2>Colorer les cercles du logo</h2>

<div id="canvas-container">

<!-- ===================== -->
<!--  TON LOGO EN SVG      -->
<!-- ===================== -->

<svg id="logo" width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <style>
    .main { stroke:#6139E0; fill:#6139E0; }
    .empty { stroke:#6139E0; fill:white; }
    text { font-family: Arial, sans-serif; fill:#6139E0; font-size:26px; font-weight:600 }
  </style>

  <circle cx="250" cy="250" r="230" stroke="#6139E0" stroke-width="10" fill="white"/>
  <line x1="250" y1="20" x2="250" y2="480" stroke="#6139E0" stroke-width="8"/>
  <line x1="20" y1="250" x2="480" y2="250" stroke="#6139E0" stroke-width="8"/>

  <!-- Les 20 cercles du logo (tous cliquables) -->
  <circle id="c1" class="empty" cx="150" cy="110" r="22" stroke-width="6"/>
  <circle id="c2" class="empty" cx="190" cy="110" r="22" stroke-width="6"/>
  <circle id="c3" class="main" cx="150" cy="165" r="22"/>
  <circle id="c4" class="main" cx="190" cy="165" r="22"/>
  <circle id="c5" class="main" cx="170" cy="215" r="22"/>

  <circle id="c6" class="empty" cx="350" cy="110" r="22" stroke-width="6"/>
  <circle id="c7" class="empty" cx="310" cy="110" r="22" stroke-width="6"/>
  <circle id="c8" class="main" cx="350" cy="165" r="22"/>
  <circle id="c9" class="main" cx="310" cy="165" r="22"/>
  <circle id="c10" class="main" cx="330" cy="215" r="22"/>

  <circle id="c11" class="empty" cx="150" cy="310" r="22" stroke-width="6"/>
  <circle id="c12" class="empty" cx="190" cy="310" r="22" stroke-width="6"/>
  <circle id="c13" class="main" cx="150" cy="365" r="22"/>
  <circle id="c14" class="main" cx="190" cy="365" r="22"/>
  <circle id="c15" class="main" cx="170" cy="415" r="22"/>

  <circle id="c16" class="empty" cx="350" cy="310" r="22" stroke-width="6"/>
  <circle id="c17" class="empty" cx="310" cy="310" r="22" stroke-width="6"/>
  <circle id="c18" class="main" cx="350" cy="365" r="22"/>
  <circle id="c19" class="main" cx="310" cy="365" r="22"/>
  <circle id="c20" class="main" cx="330" cy="415" r="22"/>

  <!-- pictos et textes identiques au précédent SVG -->
  <path d="M110 130 Q100 110 120 100 Q140 110 130 130 L120 145 L110 130Z" fill="#6139E0"/>
  <text x="110" y="235">Cardio</text>

  <path d="M330 130 L360 140 L300 140 Z" fill="#6139E0"/>
  <circle cx="330" cy="115" r="10" fill="#6139E0"/>
  <line x1="330" y1="125" x2="330" y2="160" stroke="#6139E0" stroke-width="8"/>
  <text x="300" y="235">Équilibre</text>

  <path d="M110 330 L140 360 L130 390 L90 360 Z" fill="#6139E0"/>
  <circle cx="120" cy="315" r="10" fill="#6139E0"/>
  <text x="100" y="440">Souplesse</text>

  <rect x="300" y="330" width="60" height="12" fill="#6139E0"/>
  <rect x="295" y="325" width="10" height="22" fill="#6139E0"/>
  <rect x="360" y="325" width="10" height="22" fill="#6139E0"/>
  <text x="255" y="440">Renforcement</text>
  <text x="255" y="470">musculaire</text>

</svg>

</div>

<!-- Sélecteur de couleur -->
<input type="color" id="color-picker" value="#6139E0">

<!-- Bouton téléchargement -->
<button onclick="downloadPNG()">Télécharger en PNG</button>

<script>
    const picker = document.getElementById('color-picker');
    const circles = document.querySelectorAll('svg circle');

    circles.forEach(circle => {
        circle.addEventListener('click', () => {
            circle.setAttribute('fill', picker.value);
        });
    });

    function downloadPNG() {
        const svg = document.getElementById("logo");
        const svgData = new XMLSerializer().serializeToString(svg);
        const svgBlob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(svgBlob);

        const img = new Image();
        img.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = svg.width.baseVal.value;
            canvas.height = svg.height.baseVal.value;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);

            const pngFile = canvas.toDataURL("image/png");

            const link = document.createElement("a");
            link.download = "logo_colore.png";
            link.href = pngFile;
            link.click();
            URL.revokeObjectURL(url);
        };
        img.src = url;
    }
</script>

</body>
</html>
